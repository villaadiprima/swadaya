<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Donasi Villa Adiprima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; padding: 10px 0; }
    .container { max-width: 500px; padding: 0 8px; }
    
    /* Header lebih ringkas */
    .header-card { 
        background: linear-gradient(135deg, #2c3e50, #34495e); 
        color: white; border-radius: 10px; padding: 12px 10px; 
        text-align: center; margin-bottom: 10px; 
    }
    .header-card h4 { font-size: 0.95rem; margin-bottom: 2px; line-height: 1.2; }
    .total-amount { font-size: 1.5rem; font-weight: 800; color: #18bc9c; margin: 2px 0; }
    
    .bank-info { 
        font-size: 0.7rem; background: rgba(255,255,255,0.08); 
        padding: 5px; border-radius: 6px; border: 1px dashed #18bc9c; margin-top: 8px;
    }

    .data-card { background: white; border-radius: 10px; padding: 5px 10px; }
    
    /* Tabel Super Rapat */
    .table { font-size: 0.78rem; margin-bottom: 0; }
    .table td, .table th { 
        padding: 4px 2px !important; /* Jarak antar baris sangat minim */
        vertical-align: middle;
        border-bottom: 1px solid #f0f0f0;
    }
    .table thead th { font-size: 0.7rem; color: #7f8c8d; text-transform: uppercase; border-bottom: 2px solid #eee; }
    
    .nama-donatur { font-weight: 600; color: #2c3e50; display: block; line-height: 1; }
    .tgl-donasi { font-size: 0.65rem; color: #95a5a6; }
    
    #loader { text-align: center; padding: 20px; }
    #content { display: none; }
    .text-small { font-size: 0.65rem; }
</style>
</head>
<body>

<div class="container">
    <div id="loader">
        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
        <p class="mt-2 text-muted" style="font-size: 0.9rem;">Memuat data donasi...</p>
    </div>

    <div id="content">
        <div class="header-card">
            <h4 class="text-uppercase">Swadaya Masyarakat<br>Perbaikan Jalan Utama</h4>
            <h5>Total Dana Terkumpul</h5>
            <div class="total-amount" id="totalDisplay">Rp 0</div>
            <p class="mb-0 text-small">Perum Villa Adiprima - RW 15</p>
            
            <div class="bank-info">
                Donasi via <strong>BCA 0380096919</strong><br>
                a.n DITA BAGUS KRISTANTO
            </div>
        </div>

        <div class="data-card">
            <h6 class="fw-bold mb-3" style="font-size: 0.95rem;">Daftar Donatur Terkini:</h6>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr style="font-size: 0.8rem;">
                            <th>No</th>
                            <th>Nama</th>
                            <th class="text-end">Nominal</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
        
        <p class="text-center text-muted mt-3 text-small">
            Data diperbarui secara otomatis dari sistem pengurus.
        </p>
    </div>
</div>

<script>
    const api_url = "https://script.google.com/macros/s/AKfycbyimpJ0gEbGYtiHT379VHIbxLq0Zn3SusaMQut7JwALI6jeqshf0jIqB_7q5GHTZEpNaQ/exec";

    async function fetchData() {
        try {
            const response = await fetch(api_url);
            const data = await response.json();
            
            // Update Total
            document.getElementById('totalDisplay').innerText = "Rp " + data.totalDonasi.toLocaleString('id-ID');
            
            // Update Table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            
            data.donatur.forEach(item => {
                let row = `<tr>
                    <td>${item.no}</td>
                    <td><strong>${item.nama}</strong><br><span class="text-muted text-small">${item.tanggal}</span></td>
                    <td class="text-end fw-bold text-success">Rp ${item.nominal.toLocaleString('id-ID')}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('content').style.display = 'block';

        } catch (error) {
            console.error("Gagal:", error);
            document.getElementById('loader').innerHTML = "<p class='text-danger text-small'>Gagal memuat data. Cek koneksi atau izin Apps Script.</p>";
        }
    }

    fetchData();
</script>

</body>
</html>
